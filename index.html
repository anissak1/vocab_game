<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lexicon">
<title>Lexicon — SSAT Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --paper:#FAF6EE;
    --paper-raised:#FFFFFF;
    --paper-dim:#F0EBDD;
    --ink:#2B2620;
    --ink-soft:#5C5346;
    --ink-faint:#9C9384;
    --accent:#2E6DA4;
    --accent-light:#D9E6F5;
    --accent-dark:#1F4E79;
    --sage:#4A6B5A;
    --sage-light:#DCE8E1;
    --sage-dark:#2F4A3B;
    --brick:#A8453B;
    --brick-light:#F3DEDA;
    --brick-dark:#7A2F27;
    --line:rgba(43,38,32,0.12);
    --line-strong:rgba(43,38,32,0.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Source Sans 3',-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .serif{font-family:'Lora',Georgia,serif;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}

  /* top bar */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));
    border-bottom:1px solid var(--line);
    background:var(--paper);position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:8px;}
  .brand-mark{width:26px;height:26px;border-radius:6px;background:var(--accent-dark);display:flex;align-items:center;justify-content:center;color:var(--accent-light);font-family:'Lora',serif;font-weight:600;font-size:14px;}
  .brand-name{font-family:'Lora',serif;font-weight:600;font-size:17px;letter-spacing:0.2px;}
  .view-toggle{display:flex;background:var(--paper-dim);border-radius:8px;padding:2px;border:1px solid var(--line);}
  .view-toggle button{
    border:none;background:none;padding:6px 11px;font-size:12px;font-weight:600;
    color:var(--ink-faint);border-radius:6px;font-family:'Source Sans 3',sans-serif;
  }
  .view-toggle button.active{background:var(--paper-raised);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,0.06);}

  main{flex:1;padding:18px;}

  /* ---- HOME / her view ---- */
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .stat-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center;}
  .stat-num{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--accent-dark);}
  .stat-label{font-size:11px;color:var(--ink-faint);margin-top:2px;font-weight:500;}

  .section-label{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);font-weight:600;margin:0 0 10px 2px;}

  .daily-card{
    background:linear-gradient(180deg,var(--accent-dark),var(--accent-dark));
    background:var(--accent-dark);
    border-radius:16px;padding:20px;color:var(--accent-light);margin-bottom:24px;
    position:relative;overflow:hidden;
  }
  .daily-card .tag{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.75;font-weight:600;}
  .daily-card h2{font-family:'Lora',serif;font-size:20px;margin:6px 0 4px;color:#fff;font-weight:600;}
  .daily-card p{font-size:13px;margin:0 0 14px;opacity:0.85;line-height:1.5;}
  .daily-card button{
    background:#fff;color:var(--accent-dark);border:none;border-radius:9px;
    padding:11px 18px;font-weight:600;font-size:14px;font-family:'Source Sans 3',sans-serif;
    display:inline-flex;align-items:center;gap:6px;
  }

  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
  .mode-card{
    background:var(--paper-raised);border:1px solid var(--line);border-radius:14px;
    padding:16px 14px;text-align:left;display:flex;flex-direction:column;gap:8px;min-height:108px;
  }
  .mode-card i{font-size:20px;color:var(--accent-dark);}
  .mode-card .m-title{font-weight:600;font-size:14px;}
  .mode-card .m-sub{font-size:12px;color:var(--ink-faint);line-height:1.4;}

  .root-strip{
    background:var(--sage-light);border-radius:14px;padding:14px 16px;margin-bottom:8px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .root-strip .r-left{display:flex;flex-direction:column;gap:2px;}
  .root-strip .r-eyebrow{font-size:11px;color:var(--sage-dark);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
  .root-strip .r-title{font-family:'Lora',serif;font-size:15px;color:var(--sage-dark);font-weight:600;}
  .root-strip button{background:var(--sage-dark);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;font-family:'Source Sans 3',sans-serif;}

  /* ---- CARD / QUIZ VIEW ---- */
  .quiz-wrap{display:flex;flex-direction:column;min-height:calc(100vh - 64px);}
  .quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .quiz-back{background:none;border:none;color:var(--ink-soft);font-size:20px;padding:4px;display:flex;}
  .progress-track{flex:1;height:6px;background:var(--paper-dim);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent-dark);border-radius:3px;transition:width 0.3s ease;}
  .quiz-count{font-size:12px;color:var(--ink-faint);font-weight:600;min-width:40px;text-align:right;}

  .word-card{
    background:var(--paper-raised);border:1px solid var(--line);border-radius:18px;
    padding:28px 22px;text-align:center;margin-bottom:18px;min-height:180px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    cursor:pointer;user-select:none;
  }
  .word-card .pos-tag{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;}
  .word-card .the-word{font-family:'Lora',serif;font-size:30px;font-weight:600;color:var(--ink);}
  .word-card .root-hint{font-size:12px;color:var(--accent-dark);font-weight:500;background:var(--accent-light);padding:4px 10px;border-radius:7px;margin-top:4px;}
  .word-card .flip-hint{font-size:12px;color:var(--ink-faint);margin-top:10px;}
  .word-card .def-text{font-size:16px;line-height:1.55;color:var(--ink-soft);}
  .word-card .ex-text{font-size:13px;line-height:1.5;color:var(--ink-faint);font-style:italic;font-family:'Lora',serif;}

  .opt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
  .opt-btn{
    background:var(--paper-raised);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;text-align:left;font-size:15px;font-family:'Source Sans 3',sans-serif;color:var(--ink);
  }
  .opt-btn.correct{background:var(--sage-light);border-color:var(--sage);color:var(--sage-dark);font-weight:600;}
  .opt-btn.incorrect{background:var(--brick-light);border-color:var(--brick);color:var(--brick-dark);font-weight:600;}
  .opt-btn:disabled{opacity:1;}

  .quiz-actions{display:flex;gap:10px;margin-top:auto;padding-top:8px;}
  .quiz-actions button{flex:1;border-radius:11px;padding:13px;font-weight:600;font-size:14px;font-family:'Source Sans 3',sans-serif;border:none;}
  .btn-fail{background:var(--brick-light);color:var(--brick-dark);}
  .btn-pass{background:var(--sage);color:#fff;}
  .btn-primary{background:var(--accent-dark);color:var(--accent-light);}

  /* root builder mode */
  .root-target{text-align:center;margin-bottom:20px;}
  .root-target .rt-word{font-family:'Lora',serif;font-size:26px;font-weight:600;}
  .root-target .rt-sub{font-size:13px;color:var(--ink-faint);margin-top:4px;}
  .root-piece-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 24px;}
  .root-chip{background:var(--paper-dim);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:14px;font-weight:500;}
  .root-chip.picked{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);}

  /* session complete */
  .complete-wrap{text-align:center;padding:40px 10px;}
  .complete-wrap .c-icon{width:64px;height:64px;border-radius:50%;background:var(--sage-light);color:var(--sage-dark);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px;}
  .complete-wrap h2{font-family:'Lora',serif;font-size:22px;margin:0 0 6px;}
  .complete-wrap p{color:var(--ink-faint);font-size:14px;margin:0 0 24px;}
  .complete-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}

  /* ---- PARENT DASHBOARD ---- */
  .dash-header{margin-bottom:22px;}
  .dash-header h1{font-family:'Lora',serif;font-size:22px;margin:0 0 4px;}
  .dash-header p{font-size:13px;color:var(--ink-faint);margin:0;}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
  .dash-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .dash-card .d-label{font-size:12px;color:var(--ink-faint);font-weight:600;margin-bottom:6px;}
  .dash-card .d-value{font-family:'Lora',serif;font-size:24px;font-weight:600;}
  .dash-card .d-sub{font-size:12px;color:var(--ink-faint);margin-top:4px;}

  .weak-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 4px;border-bottom:1px solid var(--line);
  }
  .weak-row:last-child{border-bottom:none;}
  .weak-word{font-family:'Lora',serif;font-weight:600;font-size:15px;}
  .weak-def{font-size:12px;color:var(--ink-faint);margin-top:2px;}
  .weak-pct{font-size:13px;font-weight:600;padding:4px 9px;border-radius:7px;background:var(--brick-light);color:var(--brick-dark);}

  .empty-state{text-align:center;padding:30px 10px;color:var(--ink-faint);font-size:14px;}
  .empty-state i{font-size:28px;display:block;margin-bottom:10px;opacity:0.5;}

  .bar-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
  .bar-day{font-size:11px;color:var(--ink-faint);width:30px;font-weight:600;}
  .bar-track{flex:1;height:10px;background:var(--paper-dim);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--accent-dark);border-radius:5px;}
  .bar-val{font-size:11px;color:var(--ink-faint);width:28px;text-align:right;}

  .card-title{font-family:'Lora',serif;font-size:16px;font-weight:600;margin:0 0 14px;}

  button{cursor:pointer;}
  .hidden{display:none !important;}
  .loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ink-faint);margin-right:4px;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">L</div>
      <div class="brand-name">Lexicon</div>
    </div>
    <div class="view-toggle">
      <button id="toggle-student" class="active">Practice</button>
      <button id="toggle-parent">Dashboard</button>
    </div>
  </div>

  <main id="main-content">
    <div style="text-align:center;padding:60px 0;color:var(--ink-faint);font-size:13px;">
      <span class="loading-dot"></span>Loading your progress…
    </div>
  </main>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
window.WORD_BANK = [];
window.ROOT_BANK = [];
</script>
<script>
// Upper-level SSAT vocabulary bank (grades 8-11)
// Curated for high frequency on Upper SSAT verbal section + general advanced reading vocab
const WORD_BANK = [
  // Tier: Bronze (foundational upper-level words)
  {w:"abate",d:"to lessen in intensity",p:"verb",ex:"The storm began to abate by morning.",tier:"bronze"},
  {w:"adversity",d:"a difficult or unfortunate situation",p:"noun",ex:"She showed courage in the face of adversity.",tier:"bronze"},
  {w:"ambiguous",d:"open to more than one interpretation",p:"adjective",ex:"His ambiguous answer left us confused.",tier:"bronze"},
  {w:"candid",d:"truthful and straightforward",p:"adjective",ex:"I appreciated her candid feedback.",tier:"bronze"},
  {w:"diligent",d:"showing careful and persistent effort",p:"adjective",ex:"The diligent student reviewed every chapter.",tier:"bronze"},
  {w:"eloquent",d:"fluent and persuasive in speaking",p:"adjective",ex:"The eloquent speaker moved the crowd.",tier:"bronze"},
  {w:"frugal",d:"sparing in the use of money or resources",p:"adjective",ex:"He lived a frugal life despite his wealth.",tier:"bronze"},
  {w:"gregarious",d:"sociable, fond of company",p:"adjective",ex:"Her gregarious nature made her popular.",tier:"bronze"},
  {w:"hostile",d:"unfriendly, antagonistic",p:"adjective",ex:"The hostile crowd booed the speaker.",tier:"bronze"},
  {w:"indifferent",d:"having no particular interest or sympathy",p:"adjective",ex:"He seemed indifferent to the outcome.",tier:"bronze"},
  {w:"jubilant",d:"feeling great happiness and triumph",p:"adjective",ex:"The team was jubilant after the win.",tier:"bronze"},
  {w:"lethargic",d:"sluggish, lacking energy",p:"adjective",ex:"The heat made everyone lethargic.",tier:"bronze"},
  {w:"meticulous",d:"showing great attention to detail",p:"adjective",ex:"She was meticulous in her research.",tier:"bronze"},
  {w:"naive",d:"showing a lack of experience or judgment",p:"adjective",ex:"It was naive to trust him so quickly.",tier:"bronze"},
  {w:"obstinate",d:"stubbornly refusing to change one's mind",p:"adjective",ex:"The obstinate child refused to apologize.",tier:"bronze"},
  {w:"plausible",d:"seeming reasonable or probable",p:"adjective",ex:"Her excuse seemed plausible at first.",tier:"bronze"},
  {w:"quell",d:"to put an end to, suppress",p:"verb",ex:"The general moved to quell the uprising.",tier:"bronze"},
  {w:"reluctant",d:"unwilling, hesitant",p:"adjective",ex:"He was reluctant to share his opinion.",tier:"bronze"},
  {w:"skeptical",d:"not easily convinced, doubting",p:"adjective",ex:"She remained skeptical of his story.",tier:"bronze"},
  {w:"tedious",d:"long, slow, and boring",p:"adjective",ex:"The tedious lecture put everyone to sleep.",tier:"bronze"},
  {w:"unanimous",d:"fully in agreement",p:"adjective",ex:"The vote was unanimous.",tier:"bronze"},
  {w:"vivid",d:"producing powerful feelings or clear images",p:"adjective",ex:"She gave a vivid description of the scene.",tier:"bronze"},
  {w:"wary",d:"feeling caution about possible danger",p:"adjective",ex:"He was wary of strangers.",tier:"bronze"},
  {w:"zealous",d:"showing great energy for a cause",p:"adjective",ex:"The zealous fans cheered all game.",tier:"bronze"},
  {w:"benevolent",d:"kind and generous",p:"adjective",ex:"The benevolent donor funded the school.",tier:"bronze"},
  {w:"concise",d:"giving information clearly in few words",p:"adjective",ex:"Her concise report saved everyone time.",tier:"bronze"},
  {w:"discreet",d:"careful not to attract attention",p:"adjective",ex:"He was discreet about the surprise party.",tier:"bronze"},
  {w:"erratic",d:"unpredictable, lacking a consistent pattern",p:"adjective",ex:"His erratic driving alarmed the passengers.",tier:"bronze"},
  {w:"feasible",d:"possible to do easily or conveniently",p:"adjective",ex:"The plan seemed feasible given our budget.",tier:"bronze"},
  {w:"genuine",d:"truly what it is said to be",p:"adjective",ex:"Her apology felt genuine.",tier:"bronze"},

  // Tier: Silver (mid-level abstraction)
  {w:"abstain",d:"to choose not to do something",p:"verb",ex:"He decided to abstain from voting.",tier:"silver"},
  {w:"acquiesce",d:"to accept something reluctantly but without protest",p:"verb",ex:"She acquiesced to her brother's demands.",tier:"silver"},
  {w:"ardent",d:"enthusiastic or passionate",p:"adjective",ex:"He was an ardent supporter of the team.",tier:"silver"},
  {w:"belligerent",d:"hostile and aggressive",p:"adjective",ex:"The belligerent customer demanded a refund.",tier:"silver"},
  {w:"cacophony",d:"a harsh mixture of sounds",p:"noun",ex:"The cacophony of car horns filled the street.",tier:"silver"},
  {w:"deference",d:"respect and esteem shown to another",p:"noun",ex:"She spoke with deference to her elders.",tier:"silver"},
  {w:"enervate",d:"to drain of energy or vitality",p:"verb",ex:"The long march enervated the soldiers.",tier:"silver"},
  {w:"fortuitous",d:"happening by chance, especially a lucky one",p:"adjective",ex:"Their meeting was entirely fortuitous.",tier:"silver"},
  {w:"garrulous",d:"excessively talkative",p:"adjective",ex:"The garrulous neighbor talked for hours.",tier:"silver"},
  {w:"hapless",d:"unlucky",p:"adjective",ex:"The hapless intern spilled coffee on the report.",tier:"silver"},
  {w:"impetuous",d:"acting quickly without thought",p:"adjective",ex:"His impetuous decision cost him dearly.",tier:"silver"},
  {w:"juxtapose",d:"to place side by side for contrast",p:"verb",ex:"The artist juxtaposed light and shadow.",tier:"silver"},
  {w:"languid",d:"slow and relaxed, lacking energy",p:"adjective",ex:"They spent a languid afternoon by the lake.",tier:"silver"},
  {w:"magnanimous",d:"generous, especially toward a rival",p:"adjective",ex:"The magnanimous winner praised her opponent.",tier:"silver"},
  {w:"nebulous",d:"unclear, vague, or ill-defined",p:"adjective",ex:"His plan was still nebulous.",tier:"silver"},
  {w:"obfuscate",d:"to make unclear or confusing",p:"verb",ex:"The lawyer tried to obfuscate the facts.",tier:"silver"},
  {w:"pragmatic",d:"dealing with things sensibly and practically",p:"adjective",ex:"She took a pragmatic approach to the problem.",tier:"silver"},
  {w:"querulous",d:"complaining in a whining manner",p:"adjective",ex:"The querulous passenger annoyed the staff.",tier:"silver"},
  {w:"reticent",d:"reluctant to speak about one's thoughts",p:"adjective",ex:"He was reticent about his personal life.",tier:"silver"},
  {w:"staid",d:"sedate, respectable, and unadventurous",p:"adjective",ex:"The staid committee rejected the bold idea.",tier:"silver"},
  {w:"taciturn",d:"reserved, saying little",p:"adjective",ex:"The taciturn man rarely spoke at dinner.",tier:"silver"},
  {w:"ubiquitous",d:"present, appearing everywhere",p:"adjective",ex:"Smartphones are now ubiquitous.",tier:"silver"},
  {w:"vacillate",d:"to waver between different opinions",p:"verb",ex:"She vacillated between the two job offers.",tier:"silver"},
  {w:"wistful",d:"having a feeling of vague longing",p:"adjective",ex:"He gave a wistful smile at the old photo.",tier:"silver"},
  {w:"zealot",d:"a person fanatical about a cause",p:"noun",ex:"The zealot refused to consider other views.",tier:"silver"},
  {w:"alacrity",d:"brisk, cheerful readiness",p:"noun",ex:"She accepted the challenge with alacrity.",tier:"silver"},
  {w:"capricious",d:"given to sudden changes of mood",p:"adjective",ex:"The capricious weather ruined our picnic.",tier:"silver"},
  {w:"dogmatic",d:"asserting opinions without proof, inflexible",p:"adjective",ex:"He was dogmatic about his political views.",tier:"silver"},
  {w:"equivocal",d:"open to more than one interpretation, ambiguous",p:"adjective",ex:"His equivocal answer satisfied no one.",tier:"silver"},
  {w:"fastidious",d:"very attentive to detail, hard to please",p:"adjective",ex:"The fastidious chef inspected every plate.",tier:"silver"},

  // Tier: Gold (highest-leverage, common on SSAT)
  {w:"abdicate",d:"to formally give up a position or duty",p:"verb",ex:"The king chose to abdicate the throne.",tier:"gold"},
  {w:"aberration",d:"a departure from what is normal",p:"noun",ex:"The error was an aberration, not the norm.",tier:"gold"},
  {w:"abrogate",d:"to repeal or do away with formally",p:"verb",ex:"The new law abrogated the old policy.",tier:"gold"},
  {w:"assuage",d:"to ease or make less severe",p:"verb",ex:"Her words helped assuage his fears.",tier:"gold"},
  {w:"austere",d:"severe, plain, without luxury",p:"adjective",ex:"The monks lived an austere life.",tier:"gold"},
  {w:"chicanery",d:"the use of trickery to achieve a goal",p:"noun",ex:"The scandal exposed years of chicanery.",tier:"gold"},
  {w:"conflagration",d:"an extensive, destructive fire",p:"noun",ex:"The conflagration destroyed the warehouse.",tier:"gold"},
  {w:"deleterious",d:"causing harm or damage",p:"adjective",ex:"Smoking has deleterious effects on health.",tier:"gold"},
  {w:"didactic",d:"intended to teach, often excessively so",p:"adjective",ex:"The film felt overly didactic.",tier:"gold"},
  {w:"ebullient",d:"cheerful and full of energy",p:"adjective",ex:"She was ebullient after the good news.",tier:"gold"},
  {w:"effrontery",d:"shameless boldness, audacity",p:"noun",ex:"He had the effrontery to demand a refund.",tier:"gold"},
  {w:"facetious",d:"treating serious things with inappropriate humor",p:"adjective",ex:"His facetious remark annoyed the teacher.",tier:"gold"},
  {w:"florid",d:"excessively elaborate or ornate",p:"adjective",ex:"The poet's florid language overwhelmed readers.",tier:"gold"},
  {w:"gratuitous",d:"uncalled for, unwarranted",p:"adjective",ex:"The film had gratuitous violence.",tier:"gold"},
  {w:"hegemony",d:"dominance of one group over others",p:"noun",ex:"The empire established regional hegemony.",tier:"gold"},
  {w:"iconoclast",d:"a person who attacks established beliefs",p:"noun",ex:"The artist was a true iconoclast.",tier:"gold"},
  {w:"impervious",d:"unable to be affected by, impenetrable",p:"adjective",ex:"He seemed impervious to criticism.",tier:"gold"},
  {w:"incontrovertible",d:"not able to be denied or disputed",p:"adjective",ex:"The evidence was incontrovertible.",tier:"gold"},
  {w:"indefatigable",d:"persisting tirelessly",p:"adjective",ex:"Her indefatigable energy inspired the team.",tier:"gold"},
  {w:"inscrutable",d:"impossible to understand or interpret",p:"adjective",ex:"His inscrutable expression revealed nothing.",tier:"gold"},
  {w:"intransigent",d:"unwilling to change one's views",p:"adjective",ex:"The intransigent senator blocked the bill.",tier:"gold"},

<script>
(function(){

const STORAGE_KEY = 'lexicon-progress-v1';

// Firebase setup — config from Firebase console (safe to expose client-side)
const firebaseConfig = {
  apiKey: "AIzaSyCKhYy6bpQhLptLORKxgnKSE4I4FJSHB4o",
  authDomain: "storage-for-words-galore.firebaseapp.com",
  databaseURL: "https://storage-for-words-galore-default-rtdb.firebaseio.com",
  projectId: "storage-for-words-galore",
  storageBucket: "storage-for-words-galore.firebasestorage.app",
  messagingSenderId: "478479401412",
  appId: "1:478479401412:web:4040e5f9186f55b8892491"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const $main = document.getElementById('main-content');
let view = 'student';
let screen = 'home';

let state = {
  xp: 0,
  streak: 0,
  lastActiveDate: null,
  wordStats: {}, // word -> {seen, correct, lastSeen}
  sessions: [],  // {date, mode, total, correct, words:[...]}
  dailyDate: null,
  dailySet: [],
  dailyDone: false
};

function todayStr(){ return new Date().toISOString().slice(0,10); }

async function loadState(){
  try{
    const snapshot = await db.ref(STORAGE_KEY).get();
    if(snapshot.exists()){
      const loaded = snapshot.val();
      state = Object.assign(state, loaded);
    }
  }catch(e){
    console.log('No existing progress found, starting fresh.', e);
  }
  checkStreak();
  render();
  // Listen for live updates from other devices (e.g. parent dashboard updates while open)
  db.ref(STORAGE_KEY).on('value', (snapshot) => {
    if(!snapshot.exists()) return;
    const loaded = snapshot.val();
    state = Object.assign(state, loaded);
    render();
  });
}

async function saveState(){
  try{
    await db.ref(STORAGE_KEY).set(state);
  }catch(e){
    console.error('Save failed', e);
  }
}

function checkStreak(){
  const today = todayStr();
  if(state.lastActiveDate === today) return;
  if(!state.lastActiveDate){ return; }
  const last = new Date(state.lastActiveDate);
  const now = new Date(today);
  const diffDays = Math.round((now - last) / 86400000);
  if(diffDays > 1){ state.streak = 0; }
}

function markActiveToday(){
  const today = todayStr();
  if(state.lastActiveDate !== today){
    state.streak += 1;
    state.lastActiveDate = today;
  }
}

function getTier(){
  // unlock tiers based on words mastered (>=3 correct)
  const mastered = Object.values(state.wordStats).filter(s => s.correct >= 3).length;
  if(mastered < 15) return ['bronze'];
  if(mastered < 35) return ['bronze','silver'];
  return ['bronze','silver','gold'];
}

function weightedWordPool(){
  const tiers = getTier();
  let pool = WORD_BANK.filter(w => tiers.includes(w.tier));
  // weight toward unseen / weak words
  return pool.map(w => {
    const s = state.wordStats[w.w] || {seen:0, correct:0};
    const accuracy = s.seen ? s.correct/s.seen : 0;
    let weight = 1;
    if(s.seen === 0) weight = 3;
    else if(accuracy < 0.5) weight = 4;
    else if(accuracy < 0.8) weight = 2;
    else weight = 0.5;
    return {word:w, weight};
  });
}

function pickWords(n){
  const weighted = weightedWordPool();
  const total = weighted.reduce((a,b)=>a+b.weight,0);
  const picked = [];
  const used = new Set();
  let safety = 0;
  while(picked.length < Math.min(n, weighted.length) && safety < n*50){
    safety++;
    let r = Math.random() * total;
    for(const item of weighted){
      r -= item.weight;
      if(r <= 0){
        if(!used.has(item.word.w)){
          used.add(item.word.w);
          picked.push(item.word);
        }
        break;
      }
    }
  }
  // fallback fill if not enough
  if(picked.length < n){
    for(const w of WORD_BANK){
      if(picked.length >= n) break;
      if(!used.has(w.w) && getTier().includes(w.tier)){ picked.push(w); used.add(w.w); }
    }
  }
  return picked;
}

function getDailySet(){
  const today = todayStr();
  if(state.dailyDate !== today){
    state.dailyDate = today;
    state.dailySet = pickWords(8).map(w=>w.w);
    state.dailyDone = false;
  }
  return state.dailySet.map(w => WORD_BANK.find(x=>x.w===w)).filter(Boolean);
}

function recordAnswer(word, correct){
  if(!state.wordStats[word]) state.wordStats[word] = {seen:0, correct:0, lastSeen:null};
  state.wordStats[word].seen += 1;
  if(correct) state.wordStats[word].correct += 1;
  state.wordStats[word].lastSeen = todayStr();
  state.xp += correct ? 10 : 2;
}

function recordSession(mode, total, correct){
  state.sessions.push({date: todayStr(), mode, total, correct, ts: Date.now()});
  if(state.sessions.length > 200) state.sessions = state.sessions.slice(-200);
  markActiveToday();
  saveState();
}

// ---------- ICONS for modes ----------
const MODES = [
  {id:'flash', icon:'ti-cards', title:'Flashcards', sub:'Flip to reveal meaning'},
  {id:'choice', icon:'ti-list-check', title:'Multiple choice', sub:'Pick the right definition'},
  {id:'roots', icon:'ti-puzzle', title:'Root builder', sub:'Decode words from roots'},
  {id:'sprint', icon:'ti-bolt', title:'Timed sprint', sub:'60 seconds, beat your best'}
];

// ============ RENDER: ROUTER ============
function render(){
  if(view === 'student'){
    if(screen.type === undefined) screen = {type:'home'};
    renderStudent();
  } else {
    renderParent();
  }
}

screen = {type:'home'};

function go(s){ screen = s; render(); window.scrollTo(0,0); }

// ============ STUDENT VIEW ============
function renderStudent(){
  if(screen.type === 'home') return renderHome();
  if(screen.type === 'flash') return renderFlash();
  if(screen.type === 'choice') return renderChoice();
  if(screen.type === 'roots') return renderRootBuilder();
  if(screen.type === 'sprint') return renderSprint();
  if(screen.type === 'complete') return renderComplete();
  if(screen.type === 'rootlesson') return renderRootLesson();
}

function statsSummary(){
  const totalSeen = Object.values(state.wordStats).reduce((a,s)=>a+s.seen,0);
  const totalCorrect = Object.values(state.wordStats).reduce((a,s)=>a+s.correct,0);
  const mastered = Object.values(state.wordStats).filter(s=>s.correct>=3).length;
  return {totalSeen, totalCorrect, mastered, accuracy: totalSeen ? Math.round(100*totalCorrect/totalSeen) : 0};
}

function renderHome(){
  const s = statsSummary();
  const daily = getDailySet();
  const tierLabel = {bronze:'Bronze', silver:'Silver', gold:'Gold'};
  const tiers = getTier();
  const currentTier = tiers[tiers.length-1];

  $main.innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${state.streak}</div><div class="stat-label">day streak</div></div>
      <div class="stat-card"><div class="stat-num">${state.xp}</div><div class="stat-label">points</div></div>
      <div class="stat-card"><div class="stat-num">${s.mastered}</div><div class="stat-label">mastered</div></div>
    </div>

    <div class="daily-card">
      <div class="tag">Today's challenge &middot; ${tierLabel[currentTier]} tier</div>
      <h2>${state.dailyDone ? 'Daily set complete' : daily.length+' words to practice'}</h2>
      <p>${state.dailyDone ? 'Nice work today. Come back tomorrow for a new set, or keep practicing below.' : 'A quick multiple-choice round picked from words you\'re still learning.'}</p>
      <button id="btn-daily"><i class="ti ti-player-play" aria-hidden="true"></i> ${state.dailyDone ? 'Practice again' : 'Start daily set'}</button>
    </div>

    <div class="section-label">Practice modes</div>
    <div class="mode-grid">
      ${MODES.map(m => `
        <button class="mode-card" data-mode="${m.id}">
          <i class="ti ${m.icon}" aria-hidden="true"></i>
          <div class="m-title">${m.title}</div>
          <div class="m-sub">${m.sub}</div>
        </button>
      `).join('')}
    </div>

    <div class="section-label">Word roots</div>
    <div class="root-strip">
      <div class="r-left">
        <div class="r-eyebrow">Greek &amp; Latin</div>
        <div class="r-title">Learn the building blocks</div>
      </div>
      <button id="btn-roots-lesson">Browse</button>
    </div>
  `;

  document.getElementById('btn-daily').onclick = () => {
    go({type:'choice', words: getDailySet(), idx:0, correct:0, isDaily:true});
  };
  document.querySelectorAll('.mode-card').forEach(btn=>{
    btn.onclick = () => {
      const mode = btn.dataset.mode;
      const words = pickWords(10);
      go({type:mode, words, idx:0, correct:0});
    };
  });
  document.getElementById('btn-roots-lesson').onclick = () => go({type:'rootlesson'});
}

function quizTopBar(idx, total){
  return `
    <div class="quiz-top">
      <button class="quiz-back" id="btn-back" aria-label="Back"><i class="ti ti-x" aria-hidden="true"></i></button>
      <div class="progress-track"><div class="progress-fill" style="width:${Math.round(100*idx/total)}%"></div></div>
      <div class="quiz-count">${idx}/${total}</div>
    </div>
  `;
}
function bindBack(){ document.getElementById('btn-back').onclick = () => go({type:'home'}); }

// ---- FLASHCARDS ----
function renderFlash(){
  const {words, idx} = screen;
  if(idx >= words.length){
    return finishSession('flash', words.length, screen.correct || words.length);
  }
  const w = words[idx];
  const flipped = screen.flipped;
  $main.innerHTML = `
    <div class="quiz-wrap">
      ${quizTopBar(idx, words.length)}
      <div class="word-card" id="flip-card">
        ${!flipped ? `
          <div class="pos-tag">${w.p}</div>
          <div class="the-word">${w.w}</div>
          <div class="flip-hint">Tap to reveal definition</div>
        ` : `
          <div class="pos-tag">${w.w}</div>
          <div class="def-text">${w.d}</div>
          <div class="ex-text">"${w.ex}"</div>
        `}
      </div>
      ${flipped ? `
        <div class="quiz-actions">
          <button class="btn-fail" id="btn-no">Didn't know it</button>
          <button class="btn-pass" id="btn-yes">Knew it</button>
        </div>
      ` : ''}
    </div>
  `;
  bindBack();
  document.getElementById('flip-card').onclick = () => {
    if(!flipped){ screen.flipped = true; render(); }
  };
  if(flipped){
    document.getElementById('btn-no').onclick = () => { recordAnswer(w.w, false); nextFlash(); };
    document.getElementById('btn-yes').onclick = () => { recordAnswer(w.w, true); screen.correct=(screen.correct||0)+1; nextFlash(); };
  }
}
function nextFlash(){
  screen.idx += 1;
  screen.flipped = false;
  render();
}

// ---- MULTIPLE CHOICE ----
function buildChoiceOptions(word){
  const distractors = WORD_BANK.filter(w=>w.w!==word.w).sort(()=>Math.random()-0.5).slice(0,3).map(w=>w.d);
  const opts = [...distractors, word.d].sort(()=>Math.random()-0.5);
  return opts;
}
function renderChoice(){
  const {words, idx} = screen;
  if(idx >= words.length){
    return finishSession(screen.isDaily ? 'daily' : 'choice', words.length, screen.correct||0);
  }
  const w = words[idx];
  if(!screen.options) screen.options = buildChoiceOptions(w);
  const answered = screen.answered;
  $main.innerHTML = `
    <div class="quiz-wrap">
      ${quizTopBar(idx, words.length)}
      <div class="word-card" style="min-height:120px;">
        <div class="pos-tag">${w.p}</div>
        <div class="the-word">${w.w}</div>
      </div>
      <div class="opt-list">
        ${screen.options.map((opt,i)=>{
          let cls = 'opt-btn';
          if(answered){
            if(opt === w.d) cls += ' correct';
            else if(opt === screen.picked && opt !== w.d) cls += ' incorrect';
          }
          return `<button class="${cls}" data-opt="${i}" ${answered?'disabled':''}>${opt}</button>`;
        }).join('')}
      </div>
    </div>
  `;
  bindBack();
  if(!answered){
    document.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.onclick = () => {
        const opt = screen.options[parseInt(btn.dataset.opt)];
        screen.picked = opt;
        screen.answered = true;
        const correct = opt === w.d;
        if(correct) screen.correct = (screen.correct||0)+1;
        recordAnswer(w.w, correct);
        render();
        setTimeout(()=>{
          screen.idx += 1;
          screen.options = null;
          screen.answered = false;
          screen.picked = null;
          if(screen.idx >= words.length && screen.isDaily) state.dailyDone = true;
          render();
        }, 900);
      };
    });
  }
}

// ---- ROOT BUILDER ----
// Uses a fixed sequence of ROOT_BANK entries, each with a verified quizWord/quizDef
// that genuinely derives from that root. No random word-root pairing.
function buildRootSequence(n){
  return [...ROOT_BANK].sort(()=>Math.random()-0.5).slice(0, Math.min(n, ROOT_BANK.length));
}
function renderRootBuilder(){
  if(!screen.rootSeq){
    screen.rootSeq = buildRootSequence(10);
    screen.idx = 0;
    screen.correct = 0;
  }
  const {rootSeq, idx} = screen;
  if(idx >= rootSeq.length){
    return finishSession('roots', rootSeq.length, screen.correct||0);
  }
  const r = rootSeq[idx];
  if(!screen.rOptions){
    const distractorRoots = ROOT_BANK.filter(x=>x.root!==r.root).sort(()=>Math.random()-0.5).slice(0,3);
    screen.rOptions = [...distractorRoots, r].sort(()=>Math.random()-0.5);
  }
  const answered = screen.rAnswered;
  $main.innerHTML = `
    <div class="quiz-wrap">
      ${quizTopBar(idx, rootSeq.length)}
      <div class="root-target">
        <div class="rt-word serif">${r.quizWord}</div>
        <div class="rt-sub">${r.quizDef}</div>
      </div>
      <div class="section-label" style="text-align:center;">Which root or prefix is inside this word?</div>
      <div class="opt-list">
        ${screen.rOptions.map((opt,i)=>{
          let cls = 'opt-btn';
          if(answered){
            if(opt.root === r.root) cls += ' correct';
            else if(opt.root === screen.rPicked) cls += ' incorrect';
          }
          return `<button class="${cls}" data-i="${i}"><strong style="font-family:'Lora',serif;">${opt.root}</strong> — ${opt.meaning} <span style="color:var(--ink-faint);font-size:12px;">(${opt.origin})</span></button>`;
        }).join('')}
      </div>
    </div>
  `;
  bindBack();
  if(!answered){
    document.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.onclick = () => {
        const opt = screen.rOptions[parseInt(btn.dataset.i)];
        screen.rPicked = opt.root;
        screen.rAnswered = true;
        const correct = opt.root === r.root;
        if(correct) screen.correct = (screen.correct||0)+1;
        recordAnswer(r.quizWord, correct);
        render();
        setTimeout(()=>{
          screen.idx += 1;
          screen.rOptions = null;
          screen.rAnswered = false;
          screen.rPicked = null;
          render();
        }, 1000);
      };
    });
  }
}

function renderRootLesson(){
  $main.innerHTML = `
    <div class="quiz-top" style="margin-bottom:14px;">
      <button class="quiz-back" id="btn-back" aria-label="Back"><i class="ti ti-x" aria-hidden="true"></i></button>
      <div class="card-title" style="margin:0;">Greek &amp; Latin roots</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${ROOT_BANK.map(r => `
        <div class="dash-card" style="padding:14px 16px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
            <span class="serif" style="font-weight:600;font-size:16px;">${r.root}</span>
            <span style="font-size:11px;color:var(--ink-faint);font-weight:600;">${r.origin}</span>
          </div>
          <div style="font-size:13px;color:var(--ink-soft);margin-bottom:4px;">means "${r.meaning}"</div>
          <div style="font-size:12px;color:var(--ink-faint);font-style:italic;">${r.example}</div>
        </div>
      `).join('')}
    </div>
  `;
  bindBack();
}

// ---- TIMED SPRINT ----
function renderSprint(){
  if(!screen.started){
    screen.started = true;
    screen.timeLeft = 60;
    screen.correct = 0;
    screen.total = 0;
    screen.words = pickWords(50);
    screen.idx = 0;
  }
  if(screen.timeLeft <= 0){
    return finishSession('sprint', screen.total, screen.correct);
  }
  const w = screen.words[screen.idx % screen.words.length];
  if(!screen.sOptions) screen.sOptions = buildChoiceOptions(w);

  $main.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-top">
        <button class="quiz-back" id="btn-back" aria-label="Back"><i class="ti ti-x" aria-hidden="true"></i></button>
        <div class="progress-track"><div class="progress-fill" style="width:${Math.round(100*screen.timeLeft/60)}%;background:var(--brick);"></div></div>
        <div class="quiz-count">${screen.timeLeft}s</div>
      </div>
      <div class="word-card" style="min-height:100px;">
        <div class="the-word">${w.w}</div>
      </div>
      <div class="opt-list">
        ${screen.sOptions.map((opt,i)=>`<button class="opt-btn" data-i="${i}">${opt}</button>`).join('')}
      </div>
      <div style="text-align:center;font-size:13px;color:var(--ink-faint);">${screen.correct} correct so far</div>
    </div>
  `;
  bindBack();
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.onclick = () => {
      const opt = screen.sOptions[parseInt(btn.dataset.i)];
      const correct = opt === w.d;
      recordAnswer(w.w, correct);
      screen.total += 1;
      if(correct) screen.correct += 1;
      screen.idx += 1;
      screen.sOptions = null;
      render();
    };
  });

  if(!screen.timerHandle){
    screen.timerHandle = setInterval(()=>{
      screen.timeLeft -= 1;
      if(screen.timeLeft <= 0){
        clearInterval(screen.timerHandle);
        screen.timerHandle = null;
        render();
      } else if(screen.type === 'sprint'){
        render();
      } else {
        clearInterval(screen.timerHandle);
      }
    }, 1000);
  }
}

function finishSession(mode, total, correct){
  if(screen.timerHandle){ clearInterval(screen.timerHandle); screen.timerHandle = null; }
  recordSession(mode, total, correct);
  go({type:'complete', mode, total, correct});
}

function renderComplete(){
  const {mode, total, correct} = screen;
  const pct = total ? Math.round(100*correct/total) : 0;
  const modeNames = {flash:'Flashcards', choice:'Multiple choice', roots:'Root builder', sprint:'Timed sprint', daily:'Daily challenge'};
  $main.innerHTML = `
    <div class="complete-wrap">
      <div class="c-icon"><i class="ti ti-check" aria-hidden="true"></i></div>
      <h2 class="serif">${modeNames[mode]||'Session'} complete</h2>
      <p>You earned ${correct*10 + (total-correct)*2} points this round.</p>
      <div class="complete-stats">
        <div class="stat-card"><div class="stat-num">${correct}/${total}</div><div class="stat-label">correct</div></div>
        <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">accuracy</div></div>
      </div>
      <button class="daily-card" style="width:100%;background:var(--accent-dark);border:none;" id="btn-home">
        <span style="color:#fff;font-weight:600;font-size:15px;">Back to practice</span>
      </button>
    </div>
  `;
  document.getElementById('btn-home').onclick = () => go({type:'home'});
}

// ============ PARENT DASHBOARD ============
function renderParent(){
  const s = statsSummary();
  const last7 = [];
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const daySessions = state.sessions.filter(sess=>sess.date===ds);
    const total = daySessions.reduce((a,x)=>a+x.total,0);
    last7.push({label: d.toLocaleDateString('en-US',{weekday:'short'}).slice(0,2), date:ds, total});
  }
  const maxDay = Math.max(1, ...last7.map(d=>d.total));

  const weak = Object.entries(state.wordStats)
    .filter(([w,s2])=>s2.seen>=2)
    .map(([w,s2])=>({word:w, def:(WORD_BANK.find(x=>x.w===w)||{}).d || '', acc: s2.correct/s2.seen, seen:s2.seen}))
    .filter(x=>x.acc < 0.6)
    .sort((a,b)=>a.acc-b.acc)
    .slice(0,8);

  const rootAttempts = Object.entries(state.wordStats).length;
  const recentSessions = [...state.sessions].reverse().slice(0,5);

  $main.innerHTML = `
    <div class="dash-header">
      <h1 class="serif">Progress overview</h1>
      <p>Updated in real time as she practices.</p>
    </div>

    <div class="dash-grid">
      <div class="dash-card"><div class="d-label">Current streak</div><div class="d-value">${state.streak} ${state.streak===1?'day':'days'}</div></div>
      <div class="dash-card"><div class="d-label">Words mastered</div><div class="d-value">${s.mastered}</div></div>
      <div class="dash-card"><div class="d-label">Overall accuracy</div><div class="d-value">${s.accuracy}%</div></div>
      <div class="dash-card"><div class="d-label">Total reps</div><div class="d-value">${s.totalSeen}</div></div>
    </div>

    <div class="dash-card" style="margin-bottom:24px;">
      <div class="card-title">Last 7 days &middot; words practiced</div>
      ${last7.map(d=>`
        <div class="bar-row">
          <div class="bar-day">${d.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(100*d.total/maxDay)}%"></div></div>
          <div class="bar-val">${d.total}</div>
        </div>
      `).join('')}
    </div>

    <div class="dash-card" style="margin-bottom:24px;">
      <div class="card-title">Words needing review</div>
      ${weak.length === 0 ? `
        <div class="empty-state"><i class="ti ti-mood-smile" aria-hidden="true"></i>No struggling words right now. ${s.totalSeen<10 ? 'Stats will fill in as she practices more.':'Nice and steady.'}</div>
      ` : weak.map(w=>`
        <div class="weak-row">
          <div>
            <div class="weak-word serif">${w.word}</div>
            <div class="weak-def">${w.def}</div>
          </div>
          <div class="weak-pct">${Math.round(w.acc*100)}%</div>
        </div>
      `).join('')}
    </div>

    <div class="dash-card">
      <div class="card-title">Recent sessions</div>
      ${recentSessions.length === 0 ? `
        <div class="empty-state"><i class="ti ti-clock" aria-hidden="true"></i>No sessions yet.</div>
      ` : recentSessions.map(sess=>`
        <div class="weak-row">
          <div>
            <div class="weak-word serif" style="font-size:14px;text-transform:capitalize;">${sess.mode}</div>
            <div class="weak-def">${new Date(sess.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          </div>
          <div class="weak-pct" style="background:var(--sage-light);color:var(--sage-dark);">${sess.correct}/${sess.total}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ============ NAV ============
document.getElementById('toggle-student').onclick = () => {
  view='student'; screen={type:'home'};
  document.getElementById('toggle-student').classList.add('active');
  document.getElementById('toggle-parent').classList.remove('active');
  render();
};
document.getElementById('toggle-parent').onclick = () => {
  view='parent';
  document.getElementById('toggle-parent').classList.add('active');
  document.getElementById('toggle-student').classList.remove('active');
  render();
};

loadState();

})();
</script>
